<!-- 2) 채팅 오버레이·드로어용 CSS -->
<style>
    /* 반투명 뒤배경 */
    .chat-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 9998;
    }

    .chat-overlay.open {
        display: block;
    }

    /* 우측 슬라이드 패널 */
    .chat-drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 90%;
        max-width: 800px;
        background: #1c1e2b;
        transform: translateX(100%);
        transition: transform 0.3s ease-out;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
    }

    .chat-drawer.open {
        transform: translateX(0);
    }

    /* 닫기 버튼 */
    .chat-drawer-close {
        align-self: flex-end;
        padding: 12px;
        font-size: 24px;
        color: #fff;
        cursor: pointer;
    }

    /* iframe 꽉 채우기 */
    .chat-drawer iframe {
        flex: 1;
        border: none;
    }

    /* 조이패드 아이콘 스타일 */
    #joypadIcon {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        fill: white;
        margin-left: 12px;
        transition: fill 0.3s;
    }

    #joypadIcon:hover {
        fill: #0f0;
    }

    #notificationBtn.has-unread svg {
        filter: drop-shadow(0 0 4px #f00);
    }

    #notificationBtn.has-unread::after {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #f00;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        right: 2px;
    }

    #notificationBtn {
        position: relative;
    }

    #notificationModal {
        position: absolute;
        top: 48px; /* 헤더 아래에 위치 */
        right: 24px;
        width: 340px;
        max-height: 420px;
        background: #181a23;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        z-index: 10001;
        display: none;
        padding: 0 0 8px 0;
        overflow: hidden;
        border: 1px solid #222;
    }

    .notification-list {
        max-height: 340px;
        overflow-y: auto;
        padding: 12px 0 0 0;
    }

    .notification-item {
        padding: 12px 20px 8px 20px;
        border-bottom: 1px solid #23242c;
        font-size: 15px;
        color: #eee;
        background: none;
    }
    .notification-item.unread .message {
        color: #00d084;
        font-weight: 600;
    }
    .notification-item:last-child {
        border-bottom: none;
    }
    .notification-item .time {
        font-size: 12px;
        color: #aaa;
        margin-top: 2px;
    }
    #notificationMoreBtn {
        width: 100%;
        background: none;
        border: none;
        color: #aaa;
        font-size: 14px;
        padding: 10px 0 6px 0;
        cursor: pointer;
        border-top: 1px solid #23242c;
        border-radius: 0 0 16px 16px;
        transition: background 0.15s;
    }
    #notificationMoreBtn:hover {
        background: #23242c;
        color: #00d084;
    }
</style>

<!-- 4) 기존 오버레이 & 드로어 HTML (채팅용) -->
<div id="chatOverlay" class="chat-overlay" onclick="
       this.classList.remove('open');
       document.getElementById('chatDrawer').classList.remove('open');
     ">
</div>

<div id="chatDrawer" class="chat-drawer">
    <!-- 닫기 버튼 (×) -->
    <span class="chat-drawer-close" onclick="
          document.getElementById('chatOverlay').classList.remove('open');
          document.getElementById('chatDrawer').classList.remove('open');
        ">
        &times;
    </span>

    <!-- 실제 채팅 페이지 -->
    <iframe src="/test/chatting"></iframe>
</div>

<!-- 5) 토글 스크립트 (채팅 전용, 절대 건드리지 마세요) -->
<script>
    const toggle = document.getElementById('chatToggle');
    const overlay = document.getElementById('chatOverlay');
    const drawer = document.getElementById('chatDrawer');
    const closeBtn = document.querySelector('.chat-drawer-close');

    function openChat() {
        overlay.classList.add('open');
        drawer.classList.add('open');
    }
    function closeChat() {
        overlay.classList.remove('open');
        drawer.classList.remove('open');
    }

    toggle.addEventListener('click', () =>
        drawer.classList.contains('open') ? closeChat() : openChat()
    );
    closeBtn.addEventListener('click', closeChat);
    overlay.addEventListener('click', closeChat);
</script>

<div id="notificationModal" class="notification-modal" style="display:none;">
    <div class="notification-list" id="notificationList"></div>
    <button id="notificationMoreBtn">알림 더보기</button>
</div>
