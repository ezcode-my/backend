<!-- 문제 리스트 페이지 + 검색 팝업 통합 (iframe 제거 버전) -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title>EzCode 문제 리스트</title>
    <link rel="stylesheet" href="/css/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Inter:wght@400;600&display=swap"
          rel="stylesheet">
    <style>
        body {
            background-color: #0f111a;
            color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .title-bar h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: #00d084;
            margin: 0;
        }

        #openSearch {
            width: 48px;
            height: 48px;
            background-color: #0f111a;
            border: none;
            border-radius: 50%; /* 완전 둥글게 */
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.2s ease-in-out;
        }

        #openSearch:hover {
            background-color: #1a1d28; /* hover 시 살짝 밝은 톤 */
            box-shadow: 0 6px 20px rgba(0, 208, 132, 0.25), 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        #openSearch img {
            width: 35px;
            height: 35px;
            filter: brightness(0) saturate(100%) invert(44%) sepia(87%) saturate(371%) hue-rotate(112deg) brightness(92%) contrast(96%);
        }

        .problem-card {
            background-color: #1c1e2b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .problem-card:hover {
            transform: translateY(-3px);
        }

        .problem-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .problem-meta {
            margin-top: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .problem-meta span {
            margin-right: 15px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background-color: #2f3242;
            color: #ccc;
            margin-right: 6px;
        }

        a {
            color: #00d084;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        #searchModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1002;
            justify-content: center;
            align-items: center;
        }

        #searchModal .modal-content {
            background-color: #1c1e2b;
            width: 90%;
            max-width: 550px;
            border-radius: 16px;
            padding: 36px;
            position: relative;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        }

        #closeSearch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>

<!-- 검색 모달 -->
<div id="searchModal">
    <div class="modal-content">
        <button id="closeSearch">&times;</button>
        <div id="searchModalContent">불러오는 중...</div>
    </div>
</div>

<div class="container">
    <div class="title-bar">
        <h1>문제 리스트</h1>
        <button id="openSearch">
            <img src="/images/search.svg" alt="검색" />
        </button>
    </div>
    <div id="problemList">불러오는 중...</div>
</div>

<script>
    const jwt = localStorage.getItem('jwtToken') || '';

    fetch('/api/problems', {
        headers: {
            'Authorization': jwt.startsWith('Bearer ') ? jwt : 'Bearer ' + jwt,
            'Accept': 'application/json'
        }
    })
        .then(res => res.json())
        .then(data => {
            const wrapper = data.result ?? data;
            const content = wrapper.content;
            const container = document.getElementById('problemList');
            container.innerHTML = '';

            if (!Array.isArray(content) || content.length === 0) {
                container.innerHTML = '<p>문제가 없습니다.</p>';
                return;
            }

            content.forEach(problem => {
                const card = document.createElement('div');
                card.className = 'problem-card';

                card.innerHTML = `
                    <div class="problem-title">
                        <a href="/test/submit?problemId=${problem.id}">${problem.id}. ${problem.title}</a>
                    </div>
                    <div class="problem-meta">
                        <span>출제자: ${problem.creator}</span>
                        <span>점수: ${problem.score}</span>
                        <span>난이도: ${problem.difficulty}</span>
                        <span>출처: ${problem.reference}</span>
                        <span>정답률: ${problem.correctSubmissions}/${problem.totalSubmissions}</span>
                    </div>
                    <div class="problem-meta">
                        ${problem.categories.map(cat => `<span class="badge">${cat}</span>`).join(' ')}
                    </div>
                `;

                container.appendChild(card);
            });
        })
        .catch(err => {
            console.error(err);
            document.getElementById('problemList').innerHTML = '<p>문제 목록을 불러오는 데 실패했습니다.</p>';
        });

    fetch('/html/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });

    document.getElementById('openSearch').addEventListener('click', async () => {
        document.getElementById('searchModal').style.display = 'flex';
        try {
            const html = await fetch('/html/problem-search.html').then(res => res.text());
            document.getElementById('searchModalContent').innerHTML = html;
            const script = document.createElement('script');
            script.src = '/js/problem-search.js';
            script.onload = () => {
                if (typeof initProblemSearch === 'function') {
                    initProblemSearch();
                }
                const closeBtn = document.getElementById('closeSearch');
                if (closeBtn) {
                    closeBtn.addEventListener('click', () => {
                        document.getElementById('searchModal').style.display = 'none';
                    });
                }
            };
            document.body.appendChild(script);
        } catch {
            document.getElementById('searchModalContent').innerHTML = '<p style="color:red">검색창 로드 실패</p>';
        }
    });
</script>
<script src="/js/headerUtils.js"></script>
<script>loadHeaderWithAuthCheck();</script>
</body>
</html>
