<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezcode Login</title>
  <link rel="stylesheet" href="/css/test-login.css">
  <link rel="stylesheet" href="/css/header.css">
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="header-placeholder"></div>
<div class="container">
  <div class="login-section">
    <div class="login-main">
      <div class="login-header">LOGIN</div>
      <div class="input-group">
        <div class="input-field email">
          <input type="text" placeholder="이메일을 입력해주세요">
        </div>
        <div class="input-field password">
          <input type="password" placeholder="비밀번호를 입력해주세요">
        </div>
      </div>
      <button class="login-button default">로그인</button>
      <button class="signup-email-button">이메일 회원가입</button>
      <div class="find-account">비밀번호 찾기</div>
      <div class="social-login-divider">
        <span class="social-login-text">소셜 로그인</span>
      </div>
      <div class="social-icons">
        <a href="http://localhost:8080/login" class="social-icon google">
          <img src="/images/googleIcon.png" alt="Google">
        </a>
        <div class="social-icon github">
          <img src="/images/githubIcon.png" alt="GitHub">
        </div>
      </div>
    </div>
  </div>
  <div class="welcome-section">
    <div class="welcome-text">
      어서오세요,<br>당신의코딩을 돕는 EzCode입니다
    </div>
    <div class="logo-image">
      <img src="/images/logo.png" alt="EzCode Logo">
    </div>
  </div>
</div>
<!-- 비밀번호 찾기 모달 -->
<div id="email-modal" class="modal">
  <div class="modal-content">
    <h3>비밀번호 재설정</h3>
    <p>가입한 이메일 주소를 입력해주세요.</p>
    <input type="email" id="reset-email" placeholder="example@email.com" />
    <div class="modal-buttons">
      <button onclick="closeModal()">취소</button>
      <button onclick="sendFindPassword()">전송</button>
    </div>
  </div>
</div>

</body>
<script>

  function closeModal() {
    document.getElementById('email-modal').style.display = 'none';
  }

  function sendFindPassword() {
    const email = document.getElementById('reset-email').value;

    if (!email) {
      alert("이메일을 입력해주세요.");
      return;
    }

    const requestBody = {
      email: email,
      redirectUrl: "http://localhost:8080"
    };

    fetch("/api/auth/find-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(requestBody)
    })
            .then(response => {
              if (!response.ok) throw new Error("이메일 전송에 실패했습니다.");
              return response.json();
            })
            .then(data => {
              const token = data.result?.tempResetToken;
              if (token) {
                window.location.href = `/test/reset-password?tempResetToken=${encodeURIComponent(token)}`;
              } else {
                alert("토큰이 응답되지 않았습니다.");
              }
            })
            .catch(error => {
              alert("에러가 발생했습니다: " + error.message);
            });
  }


  document.querySelector('.find-account').addEventListener('click', function () {
    document.getElementById('email-modal').style.display = 'block';
  });
    const requestBody = {
      email: email,
      redirectUrl: "http://localhost:8080"
    };

    fetch("/api/auth/find-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(requestBody)
    })
            .then(response => {
              if (!response.ok) {
                throw new Error("이메일 전송에 실패했습니다.");
              }
              return response.json();
            })
            .then(data => {
              alert(data.message || "비밀번호 재설정 링크가 이메일로 전송되었습니다.");
            })
            .catch(error => {
              alert("에러가 발생했습니다: " + error.message);
            });

  const emailInput = document.querySelector('.input-field.email input');
  const passwordInput = document.querySelector('.input-field.password input');
  const loginButton = document.querySelector('.login-button');

  function updateLoginButtonState() {
    if (emailInput.value.trim() && passwordInput.value.trim()) {
      loginButton.classList.add('active');
    } else {
      loginButton.classList.remove('active');
    }
  }

  emailInput.addEventListener('input', updateLoginButtonState);
  passwordInput.addEventListener('input', updateLoginButtonState);

  loginButton.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      alert("이메일과 비밀번호를 입력해주세요.");
      return;
    }

    try {
      const response = await fetch("/api/auth/signin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      if (!response.ok) {
        const errorData = await response.json();
        alert("로그인 실패: " + (errorData.message || response.status));
        return;
      }

      const responseJson = await response.json();
      console.log("응답 데이터:", responseJson);
      const tokens = responseJson.result;

      if (tokens?.accessToken) {
        sessionStorage.setItem("accessToken", tokens.accessToken);
        window.location.href = "/test/main"; // 또는 /dashboard 등 이동할 경로
      } else {
        alert("accessToken이 응답에 없습니다.");
      }
    } catch (e) {
      console.error("로그인 에러", e);
      alert("로그인 중 오류 발생");
    }
  });

  // 헤더 include
  fetch('/html/header.html')
          .then(res => res.text())
          .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
          });
</script>
</html>
