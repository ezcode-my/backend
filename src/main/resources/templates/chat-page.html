<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 채팅방</title>

    <!-- WebSocket 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #f5f5f5; }
        #app { width: 100%; max-width: 1000px; height: 80vh; display: flex;
            border: 1px solid #ddd; border-radius: 8px; background-color: #fff;
            overflow: hidden; }
        #sidebar { width: 200px; border-right: 1px solid #ddd; padding: 16px; }
        #sidebar h2 { margin: 0 0 12px; font-size: 1.2em; }
        #roomList { list-style: none; margin: 0; padding: 0;
            height: calc(100% - 32px); overflow-y: auto; }
        #roomList li { padding: 8px 12px; margin-bottom: 6px;
            border-radius: 4px; cursor: pointer; }
        #roomList li.active { background-color: #e6f7ff; }
        #chatContainer { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; list-style: none; padding: 16px; margin: 0;
            overflow-y: auto; }
        #messages li { padding: 6px 10px; margin-bottom: 8px;
            background-color: #fafafa; border-radius: 4px;
            font-size: 0.9em; }
        #inputArea { display: flex; border-top: 1px solid #ddd; }
        #msg { flex: 1; padding: 12px; border: none; outline: none; }
        #sendBtn { padding: 0 16px; border: none; background-color: #007bff;
            color: #fff; cursor: pointer; }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <h2>채팅방 목록</h2>
        <ul id="roomList"></ul>
    </div>
    <div id="chatContainer">
        <ul id="messages"></ul>
        <div id="inputArea">
            <input id="msg" type="text" placeholder="메시지를 입력하세요..." />
            <button id="sendBtn">전송</button>
        </div>
    </div>
</div>

<script>
    const socket = new SockJS('/ws');
    const stomp = Stomp.over(socket);
    let chatSubscription;
    let currentRoomId;

    stomp.connect({}, () => {
        const messagesEl = document.getElementById('messages');
        const roomListEl = document.getElementById('roomList');
        const receiptId = 'sub-1';

        // 1) 전체 채팅 메시지 구독 (이력 렌더링)
        stomp.subscribe('/user/queue/chat', msg => {
            messagesEl.innerHTML = '';
            let chats;
            try { chats = JSON.parse(msg.body); } catch { return; }
            chats.forEach(chat => {
                const time = new Date(chat.time)
                    .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const li = document.createElement('li');
                li.textContent = `[${time}] ${chat.name} (${chat.tier}): ${chat.message}`;
                messagesEl.appendChild(li);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;
        });

        // 2) 채팅방 목록 변경 브로드캐스트 구독
        stomp.subscribe('/topic/chatrooms', msg => {
            let updated;
            try {
                updated = JSON.parse(msg.body);
            } catch {
                return;
            }
            const { roomId, title, headCount } = updated;
            const li = roomListEl.querySelector(`li[data-room-id="${roomId}"]`);
            if (!li) return;
            li.textContent = `${title} (${roomId}) — ${headCount}명`;
        });

        // 3) 채팅방 목록 초기 구독
        stomp.subscribe('/user/queue/chatrooms', msg => {
            let rooms;
            try { rooms = JSON.parse(msg.body); } catch { return; }
            roomListEl.innerHTML = '';
            rooms.forEach(room => {
                const li = document.createElement('li');
                li.textContent = `${room.title} (${room.roomId}) — ${room.headCount}명`;
                li.dataset.roomId = room.roomId;
                roomListEl.appendChild(li);
            });
        }, { receipt: receiptId });

        // 4) onreceipt 로직 유지
        stomp.onreceipt = frame => {
            if (frame.headers['receipt-id'] === receiptId) {
                stomp.send('/chat/enter', {}, '경오');
            }
        };

        // 5) 채팅방 클릭 핸들러
        roomListEl.addEventListener('click', e => {
            const li = e.target;
            const newRoomId = li.dataset.roomId;
            if (!newRoomId || currentRoomId === newRoomId) return;

            // 5-1) 이전 방 나가기 → unsubscribe
            if (chatSubscription && currentRoomId) {
                stomp.send(`/chat/room/${currentRoomId}/left`, {}, currentRoomId);
                chatSubscription.unsubscribe();
            }

            // 5-2) UI 업데이트
            currentRoomId = newRoomId;
            document.querySelectorAll('#roomList li')
                .forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            messagesEl.innerHTML = '';

            // 5-3) 신규 방 구독
            chatSubscription = stomp.subscribe(
                `/topic/chat/${currentRoomId}`,
                m => {
                    setTimeout(() => {
                        let payload;
                        try {
                            payload = JSON.parse(m.body);
                        } catch {
                            const liFallback = document.createElement('li');
                            liFallback.textContent = m.body;
                            messagesEl.appendChild(liFallback);
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            return;
                        }
                        const { time, name, tier, message } = payload;
                        const formattedTime = new Date(time)
                            .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const liB = document.createElement('li');
                        liB.textContent = `[${formattedTime}] ${name} (${tier}): ${message}`;
                        messagesEl.appendChild(liB);
                        messagesEl.scrollTop = messagesEl.scrollHeight;
                    }, 100);
                }
            );

            // 5-4) 신규 방 입장 요청
            stomp.send(`/chat/room/${currentRoomId}/enter`, {}, currentRoomId);
        });

        // 6) 전송 버튼 클릭 (REST 호출 후 JSON 렌더링)
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msg');

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();  // 혹시 폼 전송 방지
                sendBtn.click();
            }
        });

        sendBtn.addEventListener('click', () => {
            if (!currentRoomId) return;
            const message = msgInput.value.trim();
            if (!message) return;
            fetch(`/room/${currentRoomId}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
                .then(res => {
                    if (!res.ok) throw new Error('메시지 전송 실패');
                    return res.json();
                })
                .then(data => {
                    const time = new Date(data.time)
                        .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const li = document.createElement('li');
                    li.textContent = `[${time}] ${data.name} (${data.tier}): ${data.message}`;
                    messagesEl.appendChild(li);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                })
                .catch(err => console.error(err));
            msgInput.value = '';
        });
    });
</script>
</body>
</html>
