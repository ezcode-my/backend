<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title>EzCode 문제 검색</title>
    <link rel="stylesheet" href="/css/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f111a;
            color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        #header-placeholder {
            margin-bottom: 40px;
        }

        .search-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background-color: #1c1e2b;
            padding: 40px;
            border-radius: 18px;
            box-sizing: border-box;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 800;
            color: #00d084;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ccc;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            background-color: #2a2d3d;
            border: 1px solid #3a3d4d;
            border-radius: 10px;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #00d084;
            outline: none;
        }

        button[type="submit"] {
            margin-top: 24px;
            background-color: #00d084;
            border: none;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #00b472;
        }

        .autocomplete-list {
            background-color: #2a2d3d;
            border: 1px solid #3a3d4d;
            border-radius: 10px;
            margin-top: 4px;
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            width: 100%;
            z-index: 999;
        }

        .autocomplete-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #3a3d4d;
            color: #f0f2f5;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background-color: #3d414f;
            color: #00d084;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        #results {
            background-color: #1c1e2b;
            border: 1px solid #3a3d4d;
            border-radius: 10px;
            margin-top: 30px;
            padding: 20px;
            font-size: 15px;
        }

        .result-title {
            color: #00d084;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .result-item {
            background-color: #2a2d3d;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #3a3d4d;
        }

        .result-item > div {
            margin-bottom: 6px;
        }

        .result-item a {
            color: #00d084;
            font-weight: bold;
            text-decoration: none;
        }

        .result-item a:hover {
            text-decoration: underline;
        }

        .loader {
            font-size: 2rem;
            text-align: center;
            padding: 30px 0;
            color: #00d084;
        }

        @media (max-width: 768px) {
            .search-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>
<div class="search-container">
    <h2>문제 검색</h2>

    <form id="searchForm" autocomplete="off">
        <div class="form-group" id="autocomplete-box">
            <label for="keyword">검색어 입력</label>
            <input type="text" id="keyword" name="keyword" required placeholder="검색어를 입력하세요"/>
            <ul id="autocomplete-list" class="autocomplete-list"></ul>
        </div>
        <button type="submit" id="searchBtn">검색</button>
    </form>

    <div id="results"></div>
</div>

<script>
    let debounceTimer = null, focusIndex = -1;

    function getToken() {
        return sessionStorage.getItem('accessToken');
    }

    function clearAutocomplete() {
        document.getElementById('autocomplete-list').innerHTML = "";
        focusIndex = -1;
    }

    async function fetchSuggestions(keyword) {
        const token = getToken();
        if (!keyword || !token) return;
        try {
            const resp = await fetch('/api/problems/suggestions?keyword=' + encodeURIComponent(keyword), {
                headers: {'Authorization': token.startsWith('Bearer ') ? token : 'Bearer ' + token}
            });
            const data = await resp.json();
            if (!data.success || !Array.isArray(data.result)) return;
            const listEl = document.getElementById('autocomplete-list');
            listEl.innerHTML = "";
            data.result.forEach((str, idx) => {
                const li = document.createElement('li');
                li.textContent = str;
                li.className = "autocomplete-item";
                li.dataset.index = idx;
                li.onclick = () => {
                    document.getElementById('keyword').value = str;
                    clearAutocomplete();
                };
                listEl.appendChild(li);
            });
        } catch {
        }
    }

    function handleKeywordInput(e) {
        const kw = e.target.value.trim();
        clearAutocomplete();
        if (kw.length < 2) return;
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => fetchSuggestions(kw), 250);
    }

    function handleKeyDown(e) {
        const items = document.querySelectorAll('.autocomplete-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            focusIndex = (focusIndex + 1) % items.length;
            updateFocus(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            focusIndex = (focusIndex - 1 + items.length) % items.length;
            updateFocus(items);
        } else if (e.key === 'Enter' && focusIndex >= 0) {
            e.preventDefault();
            document.getElementById('keyword').value = items[focusIndex].textContent;
            clearAutocomplete();
        }
    }

    function updateFocus(items) {
        items.forEach((it, idx) => it.classList.toggle('active', idx === focusIndex));
    }

    async function handleSearchSubmit(e) {
        e.preventDefault();
        const token = getToken();
        const kw = document.getElementById('keyword').value.trim();
        if (kw.length < 2 || !token) return;

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loader">⏳</div>';
        await new Promise(r => setTimeout(r, 1000));

        try {
            const resp = await fetch('/api/problems/search?keyword=' + encodeURIComponent(kw), {
                method: 'GET',
                headers: {'Authorization': token.startsWith('Bearer ') ? token : 'Bearer ' + token}
            });
            const data = await resp.json();

            let html = '<span class="result-title">PROBLEM LIST :</span>';
            if (data.success && Array.isArray(data.result) && data.result.length) {
                html += '<div>';
                data.result.forEach(item => {
                    html += `
              <div class="result-item">
                <div><b>ID:</b> ${item.id}</div>
                <div><b>Title:</b> <a href="/test/submit?problemId=${item.id}">${item.title}</a></div>
                <div><b>Category:</b> ${item.category}</div>
                <div><b>Difficulty:</b> ${item.difficulty}</div>
                <div><b>Reference:</b> ${item.reference}</div>
                <div><b>Description:</b> ${item.description}</div>
              </div>`;
                });
                html += '</div>';
            } else {
                html += '<div style="margin-top:12px; color: #aaa;">검색 결과가 없습니다.</div>';
            }
            resultsDiv.innerHTML = html;
        } catch {
            resultsDiv.innerHTML = '<div style="color:red;">검색 중 오류가 발생했습니다.</div>';
        } finally {
            clearAutocomplete();
        }
    }

    window.onload = function () {
        clearAutocomplete();
        const ki = document.getElementById('keyword');
        ki.addEventListener('input', handleKeywordInput);
        ki.addEventListener('keydown', handleKeyDown);
        document.getElementById('searchForm').addEventListener('submit', handleSearchSubmit);
    };

    fetch('/html/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });

</script>
<script src="/js/headerUtils.js"></script>
<script>
    loadHeaderWithAuthCheck();
</script>
</body>
</html>
