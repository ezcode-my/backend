<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>EzCode 코드 제출</title>
    <!-- CodeMirror 5 core CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css" />
    <!-- (선택) 테마: dracula -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css" />

    <!-- CodeMirror 5 core JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <!-- Java/C/C++ 모드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <!-- Python 모드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Inter:wght@400;600&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
        
    <style>
        body {
            background-color: #0f111a;
            color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        #header-placeholder {
            margin-bottom: 32px;
        }

        .container {
            display: flex;
            padding: 30px 40px;
            gap: 30px;
            margin-bottom: 60px;
        }

        .left {
            flex: 1;
            background-color: #12141f;
            border-radius: 12px;
            padding: 24px;
        }

        .right {
            flex: 1.5;
            background-color: #0f111a;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section {
            background-color: #1c1e2b;
            padding: 24px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h2,
        h3 {
            color: #00d084;
            margin-bottom: 20px;
        }

        .grid {
            display: flex;
            gap: 24px;
            flex-wrap: nowrap;
            margin-bottom: 20px;
        }

        .grid>div {
            flex: 1;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background-color: #2a2d3d;
            border: 1px solid #3a3d4d;
            border-radius: 8px;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 12px;
            background-color: #00d084;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #00b472;
        }

        .result-box {
            background-color: #1e212f;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #3a3d4d;
            white-space: pre-wrap;
            font-family: 'Roboto Mono', monospace;
        }

        #prob-title {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #ffffff;
        }

        #prob-desc {
            font-size: 15px;
            line-height: 1.6;
        }

        ul {
            padding-left: 20px;
        }

        .git-sidebar {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/25/25231.png');
            background-size: 70%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1e212f;
            border-radius: 12px;
            z-index: 10;
        }

        .git-status-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: gray;
        }

        .slot {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
        }

        .init {
            background-color: #374157;
            color: #ccd6f6;
        }

        .passed {
            background-color: #214d35;
            color: #b2f5bf;
        }

        .failed {
            background-color: #552222;
            color: #f8baba;
        }

        .final-summary {
            margin-top: 12px;
            padding: 12px 16px;
            background-color: #1d2233;
            border: 1px solid #00d084;
            border-left: 5px solid #00d084;
            border-radius: 6px;
            font-size: 15px;
            color: #d0ffe2;
            font-weight: 500;
        }

        /* 1) 컨테이너 고정 높이 */
        .cm-theme {
            background-color: #1c1e2b;
            border: 1px solid #3a3d4d;
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            height: 300px;
        }

        /* 2) 에디터 전체 높이 & 폰트 */
        .cm-theme .CodeMirror {
            height: 100% !important;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 10px;
            /* 둥근 모서리 유지 */
            /* overflow: hidden;   ← 이 줄 꼭 제거하세요! */
        }

        /* 3) 실제 스크롤 영역 */
        .cm-theme .CodeMirror-scroll {
            height: 100% !important;
            overflow-y: auto;
            /* 여기서만 스크롤 */
            border-radius: 10px;
            /* 모서리 깔끔하게 */
        }

        /* 4) 스크롤바 스타일 */
        .cm-theme .CodeMirror-vscrollbar::-webkit-scrollbar {
            width: 10px;
        }

        .cm-theme .CodeMirror-vscrollbar::-webkit-scrollbar-track {
            background: #1a1c26;
            border-radius: 10px;
        }

        .cm-theme .CodeMirror-vscrollbar::-webkit-scrollbar-thumb {
            background-color: #00d084;
            border-radius: 10px;
            border: 2px solid #1a1c26;
        }

        .cm-theme .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #00b472;
        }

        .editor-wrapper {
            margin-bottom: 10px;
        }

        /* 탭바 스타일 */
        .tabbar {
            display: flex;
            gap: 8px;
            /* 버튼 사이 간격 */
            margin-bottom: 24px;
            border-bottom: 2px solid #1c1e2b;
            /* 하단 경계선 */
        }

        .tabbar button {
            padding: 10px 16px;
            cursor: pointer;
            background-color: transparent;
            /* 기본 배경 투명 */
            border: none;
            border-bottom: 3px solid transparent;
            /* 비활성 상태의 밑줄 */
            color: #ccc;
            /* 기본 글자색 */
            font-size: 20px;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }

        .tabbar button:hover {
            color: #fff;
            background-color: #2a2d3d;
            /* 마우스 올렸을 때 배경색 */
        }

        /* 활성화된 탭 버튼 스타일 */
        .tabbar button.active {
            color: #00d084;
            /* 활성 상태 글자색 */
            border-bottom-color: #00d084;
            /* 활성 상태 밑줄 */
        }

        /* 콘텐츠 영역 기본 숨김 처리 */
        .left-content {
            display: none;
        }

        /* 활성화된 콘텐츠 영역만 보여주기 */
        .left-content.active {
            display: block;
        }

        /* ===== Discussion List Styles ===== */
        #discussion-list {
            margin-top: 10px;
        }

        /* Sort bar styles */
        .discussion-sortbar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            position: relative;
            left: 0;
            top: 0;
        }
        .discussion-sort-label {
            color: #aaa;
            font-size: 13px;
            font-weight: 400;
        }
        .discussion-sort-select {
            background: #18191c;
            color: #eee;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 20px 2px 8px;
            font-size: 13px;
            min-width: 56px;
            width: 78px;
            height: 22px;
            appearance: none;
            outline: none;
            margin-left: 2px;
            box-sizing: border-box;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23aaa" height="12" viewBox="0 0 20 20" width="12" xmlns="http://www.w3.org/2000/svg"><path d="M7.293 7.293a1 1 0 011.414 0L10 8.586l1.293-1.293a1 1 0 111.414 1.414l-2 2a1 1 0 01-1.414 0l-2-2a1 1 0 010-1.414z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 6px center;
            background-size: 13px 13px;
        }
        .discussion-sort-select:focus {
            border-color: #00d084;
        }

        .discussion-item {
            background: #222;
            border-radius: 10px;
            margin-bottom: 18px;
            padding: 18px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            transition: box-shadow 0.2s;
        }
        .discussion-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        }

        /* Header (profile/nickname) */
        .discussion-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .discussion-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: #444;
            border: 1.5px solid #333;
        }
        .discussion-header .nickname {
            font-weight: 500;
            color: #e0e0e0;
            font-size: 15px;
        }

        .discussion-content {
            margin: 8px 0 8px 0;
            color: #eee;
            font-size: 15px;
            white-space: pre-line;
        }

        .discussion-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 13px;
            margin-top: 2px;
        }

        /* Action buttons (vote/reply) */
        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
            border-radius: 4px;
            padding: 2px 7px;
            cursor: pointer;
            transition: background 0.13s, color 0.13s;
            min-width: 0;
        }
        .action-btn .icon {
            font-size: 13px;
            margin-right: 1px;
        }
        .action-btn.upvote-btn:hover, .action-btn.upvote-btn:focus {
            color: #00d084;
            background: #1a2c23;
        }
        .action-btn.downvote-btn:hover, .action-btn.downvote-btn:focus {
            color: #ff4d4d;
            background: #2a1818;
        }
        .action-btn.reply-btn {
            color: #aaa;
            background: none;
            margin-left: 8px;
            font-weight: 500;
            padding: 2px 10px;
        }
        .action-btn.reply-btn:hover, .action-btn.reply-btn:focus {
            color: #00d084;
            background: #1a2c23;
        }
        .action-btn.reply-count-btn {
            color: #aaa;
            background: none;
            cursor: default;
            padding: 2px 7px;
        }
        .action-btn:disabled {
            opacity: 0.7;
            cursor: default;
        }
        .action-btn.upvote-btn.active {
            color: #00d084;
            background: #1a2c23;
        }
        .action-btn.downvote-btn.active {
            color: #ff4d4d;
            background: #2a1818;
        }
        .reply-item {
            border-left: 2px solid #333;
            margin-top: 10px;
            padding-left: 10px;
            padding-bottom: 2px;
        }
        .child-replies-container {
            margin-top: 2px;
        }
        .toggle-replies-row {
            margin-top: 8px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }
        .toggle-replies-btn,
        .toggle-child-replies-btn {
            background: none;
            color: #00d084;
            border: 1px solid #2a2d3d;
            border-radius: 5px;
            font-weight: 500;
            font-size: 13px;
            padding: 4px 14px;
            margin: 0;
            display: inline-block;
            transition: background 0.13s, color 0.13s, border 0.13s;
            box-shadow: none;
        }
        .toggle-replies-btn:hover,
        .toggle-child-replies-btn:hover {
            background: #23272f;
            color: #00e09e;
            border-color: #00d084;
        }
        .reply-write-btn {
            background: none;
            color: #00d084;
            border: 1px solid #2a2d3d;
            border-radius: 5px;
            font-weight: 500;
            font-size: 13px;
            padding: 4px 14px;
            margin: 0;
            display: inline-block;
            transition: background 0.13s, color 0.13s, border 0.13s;
            box-shadow: none;
        }
        .reply-write-btn:hover {
            background: #23272f;
            color: #00e09e;
            border-color: #00d084;
        }

        .comment-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            margin-bottom: 2px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 50%;
            cursor: pointer;
            transition: color 0.13s, background 0.13s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.upvote-btn.active,
        .icon-btn.upvote-btn:hover {
            color: #00d084;
            background: #1a2c23;
        }
        .icon-btn.downvote-btn.active,
        .icon-btn.downvote-btn:hover {
            color: #ff4d4d;
            background: #2a1818;
        }
        .vote-count {
            color: #ccc;
            font-size: 15px;
            min-width: 18px;
            text-align: center;
            font-weight: 500;
        }

        .reply-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 15px;
            font-weight: 500;
            margin-left: 8px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: color 0.13s, background 0.13s;
        }
        .reply-btn:hover {
            color: #00d084;
            background: #1a2c23;
        }

        .toggle-replies-row {
            margin-top: 2px;
        }
        .toggle-replies-btn {
            background: none;
            border: none;
            color: #00d084;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 2px 0;
            border-radius: 4px;
            transition: color 0.13s, text-decoration 0.13s;
            text-align: left;
        }
        .toggle-replies-btn:hover {
            text-decoration: underline;
            color: #00e09e;
        }

        .reply-input-box {
            margin-top: 12px;
            margin-bottom: 4px;
            background: #18191c;
            border-radius: 6px;
            padding: 14px 16px;
            border: 1px solid #23272f;
            width: 100%;
            box-sizing: border-box;
            display: block;
        }

        .reply-input-text {
            width: 100%;
            min-height: 60px;
            background: #23272f;
            color: #eee;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 15px;
            padding: 10px 12px;
            resize: vertical;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: block;
        }

        .reply-input-box > div {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .reply-cancel-btn, .reply-submit-btn {
            background: none;
            border: 1px solid #333;
            color: #aaa;
            border-radius: 4px;
            padding: 4px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.13s, color 0.13s;
        }
        .reply-submit-btn {
            color: #00d084;
            border-color: #00d084;
        }
        .reply-submit-btn:hover {
            background: #00d084;
            color: #18191c;
        }
        .reply-cancel-btn:hover {
            background: #23272f;
            color: #fff;
        }

        .discussion-create-box {
            margin-bottom: 18px;
        }

        .edit-input-box {
            margin-top: 8px;
            background: #18191c;
            border-radius: 6px;
            padding: 12px 14px;
            border: 1px solid #23272f;
            width: 100%;
            box-sizing: border-box;
            display: block;
        }
        .edit-input-text {
            width: 100%;
            min-height: 60px;
            background: #23272f;
            color: #eee;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 15px;
            padding: 10px 12px;
            resize: vertical;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: block;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 13px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 2px;
            transition: color 0.13s, background 0.13s;
            outline: none;
        }
        .edit-btn:hover {
            color: #00d084;
            background: #181f1a;
        }
        .delete-btn:hover {
            color: #ff4d4d;
            background: #2a1818;
        }

        #discussion-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            margin: 18px 0 0 0;
            flex-wrap: wrap;
        }
        #discussion-pagination button {
            background: none;
            color: #00d084;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.13s, color 0.13s;
        }
        #discussion-pagination button:disabled {
            color: #888;
            border-color: #333;
            background: #181818;
            cursor: not-allowed;
        }
        #discussion-pagination .current {
            background: #00d084;
            color: #18191c;
            border-color: #00d084;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <div class="left">

            <div id="section-tabbar" class="tabbar">
                <button class="active" id="description-tab" data-target="#description-content">문제 설명</button>
                <button id="discussion-tab" data-target="#discussion-content">토론글</button>
            </div>

            <div id="description-content" class="left-content active">
                <div id="prob-title">문제 제목</div>
                <div id="prob-desc">문제 설명이 여기에 표시됩니다.</div>
                <ul>
                    <li>시간 제한: <span id="prob-time">--</span> ms</li>
                    <li>메모리 제한: <span id="prob-mem">--</span> KB</li>
                    <li>카테고리: <span id="prob-cats">--</span></li>
                </ul>
            </div>

            <div id="discussion-content" class="left-content">
                <div id="discussion-create-box" class="discussion-create-box"></div>
                <div class="discussion-sortbar">
                    <span class="discussion-sort-label">Sort by:</span>
                    <select id="discussion-sort" class="discussion-sort-select">
                        <option value="best">Best</option>
                        <option value="upvote">Upvotes</option>
                        <option value="latest">Latest</option>
                    </select>
                </div>
                <div id="discussion-list"></div>
                <div id="discussion-pagination"></div>
            </div>

        </div>
        <div class="right">
            <div class="section">
                <h2>코드 제출</h2>
                <div class="grid">
                    <div>
                        <label for="language">언어 선택</label>
                        <select id="language">
                            <option value="1">Java</option>
                            <option value="2">C</option>
                            <option value="3">C++</option>
                            <option value="4">Python</option>
                        </select>
                    </div>
                </div>
                <label for="editor">소스코드</label>
                <div class="editor-wrapper">
                    <div id="editor" class="cm-theme" style="height: 300px;"></div>
                </div>
                <button onclick="submitCode()">코드 제출 (WebSocket)</button>
            </div>
            <div class="section">
                <h3>채점 결과</h3>
                <div class="git-sidebar">
                    <div class="git-status-dot" id="gitDot"></div>
                </div>
                <div id="judgeResult" class="result-box">여기에 테스트 결과가 표시됩니다</div>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer>
        let stompClient;
        let connected = false;
        const gitDot = document.getElementById('gitDot');
        const probTitleEl = document.getElementById('prob-title');
        const probDescEl = document.getElementById('prob-desc');
        const probTimeEl = document.getElementById('prob-time');
        const probMemEl = document.getElementById('prob-mem');
        const probCatsEl = document.getElementById('prob-cats');

        const DEFAULT_PROFILE_IMG = "/static/images/user-icon.png"; // 임의 프사 경로

        function tokenHeader() {
            const token = sessionStorage.getItem('accessToken');
            return token ? { 'Authorization': token.startsWith('Bearer ') ? token : 'Bearer ' + token } : {};
        }

        window.addEventListener('DOMContentLoaded', () => {
            const pid = new URLSearchParams(location.search).get('problemId');
            if (pid) {
                window.problemId = pid;
                loadProblem(pid);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {

            const contents = document.querySelectorAll('.left-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // 1. 모든 탭과 콘텐츠에서 'active' 클래스 제거
                    tabs.forEach(t => t.classList.remove('active'));

        async function loadProblem(pid) {
            try {
                const res = await fetch(`/api/problems/${pid}`, {
                    headers: { 'Accept': 'application/json', ...tokenHeader() }
                });
                if (!res.ok) {
                    probTitleEl.textContent = `조회 실패 (HTTP ${res.status})`;
                    return;
                }
                const wrapper = await res.json();
                const data = wrapper.result ?? wrapper;
                probTitleEl.textContent = `${data.id}. ${data.title}`;
                probDescEl.innerHTML = data.description ? marked.parse(data.description) : '';
                probTimeEl.textContent = data.timeLimit ?? '--';
                probMemEl.textContent = data.memoryLimit ?? '--';
                probCatsEl.textContent = Array.isArray(data.categories) ? data.categories.join(', ') : '';
            } catch (err) {
                console.error(err);
                probTitleEl.textContent = '네트워크 오류';
            }
        }

        async function submitCode() {
            const pid = window.problemId;
            const languageId = +document.getElementById('language').value;
            const sourceCode = window.getEditorCode();
            const payload = { languageId, sourceCode };
            const judgeEl = document.getElementById('judgeResult');
            judgeEl.innerHTML = '';

            try {
                const res = await fetch(`/api/problems/${pid}/submit-ws`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...tokenHeader()
                    },
                    body: JSON.stringify(payload)
                });
                const resp = await res.json();
                if (!resp.success) {
                    judgeEl.textContent = `Error: ${resp.message}`;
                    return;
                }
                const sessionKey = resp.result;
                initWebSocket(sessionKey);
            } catch (err) {
                console.error(err);
                judgeEl.textContent = '채점 요청 실패';
            }
        }

        const languageTemplates = {
            1: `public class Main {
    public static void main(String[] args) {
        // 코드 작성
    }
}`, // Java

            2: `#include <stdio.h>

int main() {
    // 코드 작성
    return 0;
}`, // C

            3: `#include <iostream>
using namespace std;

int main() {
    // 코드 작성
    return 0;
}`, // C++

            4: `def main():
    # 코드 작성
    pass

if __name__ == "__main__":
    main()`, // Python
        };
        // CodeMirror 인스턴스 생성
        const editor = CodeMirror(document.getElementById("editor"), {

        });

            else if (m === 2) mode = "text/x-csrc";
            else if (m === 3) mode = "text/x-c++src";
            else if (m === 4) mode = "python";
            editor.setOption("mode", mode);

            // 메인 함수 템플릿 자동 입력

        });
        // submitCode() 에서 호출할 함수
        window.getEditorCode = () => editor.getValue();

        function initWebSocket(sessionKey) {
            const tokenOnly = (sessionStorage.getItem('accessToken') || '').replace(/^Bearer /, '');
            const socket = new SockJS(`/ws?token=${encodeURIComponent(tokenOnly)}`);
            stompClient = Stomp.over(socket);
            stompClient.debug = msg => console.log('[STOMP]', msg);

            stompClient.connect({}, () => {
                connected = true;
                const base = `/user/queue/submission/${sessionKey}`;
                stompClient.subscribe(`${base}/git-status`, msg => {
                    let status;
                    try {
                        const parsed = JSON.parse(msg.body);
                        status = parsed.pushStatus ?? msg.body;
                    } catch (e) {
                        status = msg.body;
                    }
                    if (status === 'STARTED') gitDot.style.backgroundColor = '#ff9900';
                    else if (status === 'SUCCESS') gitDot.style.backgroundColor = '#00d084';
                    else if (status === 'FAILED') gitDot.style.backgroundColor = '#ff4d4d';
                    else gitDot.style.backgroundColor = 'gray';
                });
                stompClient.subscribe(`${base}/init`, msg => handleInit(JSON.parse(msg.body)));
                stompClient.subscribe(`${base}/case`, msg => handleCase(JSON.parse(msg.body)));
                stompClient.subscribe(`${base}/final`, msg => handleFinal(JSON.parse(msg.body)));
            }, err => console.error('[STOMP] 연결 오류:', err));
        }

        function handleInit(slots) {
            const judgeEl = document.getElementById('judgeResult');
            judgeEl.innerHTML = '';
            slots.forEach(s => {

                d.id = `slot-${s.seqId}`;
                d.className = 'slot init';
                d.textContent = `[${s.seqId}] 상태: ${s.status}`;
                judgeEl.appendChild(d);
            });
        }

        function handleCase(data) {
            const d = document.getElementById(`slot-${data.seqId}`);
            if (!d) return;
            d.className = data.isPassed ? 'slot passed' : 'slot failed';
            d.textContent = `[${data.seqId}] ${data.message} (${data.executionTime}ms, ${data.memoryUsage}KB)`;
        }

        function handleFinal(res) {
            const sum = document.createElement('div');
            sum.className = 'final-summary';
            sum.innerHTML = `<strong>최종:</strong> ${res.passedCount}/${res.totalCount} 통과 — ${res.message}`;
            document.getElementById('judgeResult').appendChild(sum);
        }

        async function loadDiscussions(pid, page = 0, size = 10, sortBy) {
            sortBy = sortBy || (window.currentDiscussionSortBy || 'best');

        // 댓글(1차) 조회
        async function fetchReplies(discussionId) {
            const url = `/api/problems/${window.problemId}/discussions/${discussionId}/replies`;

                headers: {

        // 대댓글(2차) 조회
        async function fetchChildReplies(discussionId, replyId) {

            const res = await fetch(url, {
                headers: {
                    'Accept': 'application/json',
                    ...tokenHeader()
                }

        function renderReplies(container, replies, discussionId, depth) {
            container.innerHTML = replies.map(r => {
                console.log(r.replyId, r.voteStatus);
                return `
                <div class="reply-item" style="margin-left:${depth * 32}px" data-reply-id="${r.replyId}">

                                renderReplies(childContainer, childReplies, discussionId, 1);
                                childContainer.dataset.loaded = 'true';
                            }
                            childContainer.style.display = 'block';

        function renderDiscussionPagination(pageData, pid) {
            const pagEl = document.getElementById('discussion-pagination');
            const totalPages = pageData.totalPages > 0 ? pageData.totalPages : 1;
            const currentPage = pageData.number + 1; // 1-based
            let html = '';

            // << (맨앞)
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="loadDiscussions('${pid}',0,10,window.currentDiscussionSortBy)">&#171;</button> `;

            // < (이전)
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="loadDiscussions('${pid}',${currentPage-2},10,window.currentDiscussionSortBy)">&#60;</button> `;

            // 페이지 숫자 (최대 10개씩)
            let start = Math.max(1, currentPage - 4);
            let end = Math.min(totalPages, start + 9);
            if (end - start < 9) start = Math.max(1, end - 9);
            for (let i = start; i <= end; i++) {
                if (i === currentPage) {
                    html += `<button class="page-btn current" disabled>${i}</button> `;
                } else {
                    html += `<button class="page-btn" onclick="loadDiscussions('${pid}',${i-1},10,window.currentDiscussionSortBy)">${i}</button> `;
                }
            }

            // > (다음)
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadDiscussions('${pid}',${currentPage},10,window.currentDiscussionSortBy)">&#62;</button> `;

            // >> (맨뒤)
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadDiscussions('${pid}',${totalPages-1},10,window.currentDiscussionSortBy)">&#187;</button>`;

            pagEl.innerHTML = html;
        }

        // 추천/비추천 SVG 함수
        function getUpvoteIcon(filled) {
            return filled
                ? `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 3l6 8h-4v6h-4v-6H4l6-8z" fill="#00d084"/></svg>`
                : `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 3l6 8h-4v6h-4v-6H4l6-8z" fill="none" stroke="#aaa" stroke-width="2"/></svg>`;
        }
        function getDownvoteIcon(filled) {
            return filled
                ? `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 17l-6-8h4V3h4v6h4l-6 8z" fill="#ff4d4d"/></svg>`
                : `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 17l-6-8h4V3h4v6h4l-6 8z" fill="none" stroke="#aaa" stroke-width="2"/></svg>`;
        }

        // 댓글/대댓글 달기 버튼 이벤트 바인딩
        document.addEventListener('click', async function(e) {
            // 댓글/대댓글 추천/비추천 (reply-item 먼저!)
            if (e.target.closest('.upvote-btn') && e.target.closest('.reply-item')) {
                const btn = e.target.closest('.upvote-btn');
                const replyId = btn.dataset.id;
                const discussionId = btn.closest('.discussion-item').dataset.discussionId;
                const voteStatus = btn.dataset.votestatus;
                await voteReply(discussionId, replyId, voteStatus === 'UP' ? 'NONE' : 'UP');
                return;
            }
            if (e.target.closest('.downvote-btn') && e.target.closest('.reply-item')) {
                const btn = e.target.closest('.downvote-btn');
                const replyId = btn.dataset.id;
                const discussionId = btn.closest('.discussion-item').dataset.discussionId;
                const voteStatus = btn.dataset.votestatus;
                await voteReply(discussionId, replyId, voteStatus === 'DOWN' ? 'NONE' : 'DOWN');
                return;
            }
            // 토론글 추천/비추천 (discussion-item는 reply-item보다 나중에 체크)
            if (e.target.closest('.upvote-btn') && e.target.closest('.discussion-item')) {
                const btn = e.target.closest('.upvote-btn');
                const discussionId = btn.dataset.id;
                const voteStatus = btn.dataset.votestatus;
                await voteDiscussion(discussionId, voteStatus === 'UP' ? 'NONE' : 'UP');
                return;
            }
            if (e.target.closest('.downvote-btn') && e.target.closest('.discussion-item')) {
                const btn = e.target.closest('.downvote-btn');
                const discussionId = btn.dataset.id;
                const voteStatus = btn.dataset.votestatus;
                await voteDiscussion(discussionId, voteStatus === 'DOWN' ? 'NONE' : 'DOWN');
                return;
            }
            // 댓글 달기
            if (e.target.classList.contains('reply-btn') && !e.target.closest('.reply-item')) {
                const discussionId = e.target.dataset.id;
                showReplyInput(discussionId, null, e.target);
            }
            // 대댓글 달기
            if (e.target.classList.contains('reply-btn') && e.target.closest('.reply-item')) {
                const replyId = e.target.dataset.id;
                const discussionId = e.target.closest('.discussion-item').dataset.discussionId;
                showReplyInput(discussionId, replyId, e.target);
            }
            // 토론글/댓글/대댓글 수정
            if (e.target.classList.contains('edit-btn')) {
                const item = e.target.closest('.discussion-item, .reply-item');
                const contentEl = item.querySelector('.discussion-content');
                const oldContent = contentEl.textContent;
                // 이미 수정창이 열려있으면 return
                if (item.querySelector('.edit-input-box')) return;
                // textarea + 취소/저장 버튼
                const box = document.createElement('div');
                box.className = 'edit-input-box';
                box.innerHTML = `
                    <textarea class="edit-input-text" style="width:100%;min-height:60px;">${oldContent}</textarea>
                    <div style="display:flex;gap:8px;justify-content:flex-end;">
                        <button class="edit-cancel-btn">취소</button>
                        <button class="edit-save-btn">저장</button>
                    </div>
                `;
                contentEl.style.display = 'none';
                contentEl.after(box);

                // 취소
                box.querySelector('.edit-cancel-btn').onclick = () => {
                    box.remove();
                    contentEl.style.display = '';
                };

                // 저장
                box.querySelector('.edit-save-btn').onclick = async () => {
                    const newContent = box.querySelector('.edit-input-text').value.trim();
                    if (!newContent) return alert('내용을 입력하세요.');
                    let url, method = 'PUT', payload = { languageId: 1, content: newContent };
                    if (item.classList.contains('discussion-item')) {
                        url = `/api/problems/${window.problemId}/discussions/${e.target.dataset.id}`;
                    } else {
                        const discussionId = item.closest('.discussion-item').dataset.discussionId;
                        url = `/api/problems/${window.problemId}/discussions/${discussionId}/replies/${e.target.dataset.id}`;
                    }
                    const res = await fetch(url, {
                        method,
                        headers: {
                            'Content-Type': 'application/json',
                            ...tokenHeader()
                        },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        // 성공: 목록 새로고침
                        if (item.classList.contains('discussion-item')) {
                            loadDiscussions(window.problemId, 0, 10, document.getElementById('discussion-sort')?.value || 'best');
                        } else {
                            const discussionId = item.closest('.discussion-item').dataset.discussionId;
                            const container = document.getElementById(`replies-for-${discussionId}`);
                            if (container) {
                                container.dataset.loaded = '';
                                const replies = await fetchReplies(discussionId);
                                renderReplies(container, replies, discussionId, 0);
                            }
                        }
                    } else {
                        alert('수정에 실패했습니다.');
                    }
                };
            }
            // 삭제
            if (e.target.classList.contains('delete-btn')) {
                if (!confirm('정말 삭제하시겠습니까?')) return;
                const item = e.target.closest('.discussion-item, .reply-item');
                let url, method = 'DELETE';
                if (item.classList.contains('discussion-item')) {
                    url = `/api/problems/${window.problemId}/discussions/${e.target.dataset.id}`;
                } else {
                    const discussionId = item.closest('.discussion-item').dataset.discussionId;
                    url = `/api/problems/${window.problemId}/discussions/${discussionId}/replies/${e.target.dataset.id}`;
                }
                (async () => {
                    const res = await fetch(url, {
                        method,
                        headers: {
                            ...tokenHeader()
                        }
                    });
                    if (res.ok) {
                        if (item.classList.contains('discussion-item')) {
                            loadDiscussions(window.problemId, 0, 10, document.getElementById('discussion-sort')?.value || 'best');
                        } else {
                            const discussionId = item.closest('.discussion-item').dataset.discussionId;
                            const container = document.getElementById(`replies-for-${discussionId}`);
                            if (container) {
                                container.dataset.loaded = '';
                                const replies = await fetchReplies(discussionId);
                                renderReplies(container, replies, discussionId, 0);
                            }
                        }
                    } else {
                        alert('삭제에 실패했습니다.');
                    }
                })();
            }
        });

        async function voteDiscussion(discussionId, voteType) {
            const res = await fetch(`/api/problems/${window.problemId}/discussions/${discussionId}/votes`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...tokenHeader()
                },
                body: JSON.stringify({ voteType })
            });
            if (res.ok) {
                updateDiscussionVoteUI(discussionId);
            } else {
                alert('추천/비추천에 실패했습니다.');
            }
        }

        async function updateDiscussionVoteUI(discussionId) {
            const res = await fetch(`/api/problems/${window.problemId}/discussions/${discussionId}/votes`, {
                headers: {
                    'Accept': 'application/json',
                    ...tokenHeader()
                }
            });
            if (!res.ok) return;
            const data = await res.json();
            if (!data.success) return;
            const { voteType, upvoteCount, downvoteCount } = data.result;
            // 버튼/카운트 갱신
            const item = document.querySelector(`.discussion-item[data-discussion-id="${discussionId}"]`);
            if (!item) return;
            const upBtn = item.querySelector('.upvote-btn');
            const downBtn = item.querySelector('.downvote-btn');
            const upCount = item.querySelector('.vote-count');
            upBtn.dataset.votestatus = voteType;
            downBtn.dataset.votestatus = voteType;
            upCount.textContent = upvoteCount;
            // 아이콘도 갱신
            upBtn.innerHTML = getUpvoteIcon(voteType === 'UP');
            downBtn.innerHTML = getDownvoteIcon(voteType === 'DOWN');
        }

        async function voteReply(discussionId, replyId, voteType) {
            const res = await fetch(`/api/problems/${window.problemId}/discussions/${discussionId}/replies/${replyId}/votes`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...tokenHeader()
                },
                body: JSON.stringify({ voteType })
            });
            if (res.ok) {
                updateReplyVoteUI(discussionId, replyId);
            } else {
                alert('추천/비추천에 실패했습니다.');
            }
        }

        async function updateReplyVoteUI(discussionId, replyId) {
            const res = await fetch(`/api/problems/${window.problemId}/discussions/${discussionId}/replies/${replyId}/votes`, {
                headers: {
                    'Accept': 'application/json',
                    ...tokenHeader()
                }
            });
            if (!res.ok) return;
            const data = await res.json();
            if (!data.success) return;
            const { voteType, upvoteCount, downvoteCount } = data.result;
            const item = document.querySelector(`.reply-item[data-reply-id="${replyId}"]`);
            if (!item) return;
            const upBtn = item.querySelector('.upvote-btn');
            const downBtn = item.querySelector('.downvote-btn');
            const upCount = item.querySelector('.vote-count');
            upBtn.dataset.votestatus = voteType;
            downBtn.dataset.votestatus = voteType;
            upCount.textContent = upvoteCount;
            upBtn.innerHTML = getUpvoteIcon(voteType === 'UP');
            downBtn.innerHTML = getDownvoteIcon(voteType === 'DOWN');
        }

        function showReplyInput(discussionId, parentReplyId, btnEl) {
            // 이미 열려있으면 return
            const next = btnEl.closest('.comment-actions').nextElementSibling;
            if (next && next.classList.contains('reply-input-box')) return;

            const box = document.createElement('div');
            box.className = 'reply-input-box';
            box.innerHTML = `
                <textarea class="reply-input-text" rows="3" style="width:100%;resize:vertical;margin-bottom:6px;"></textarea>
                <div style="display:flex;gap:8px;">
                    <button class="reply-cancel-btn">취소</button>
                    <button class="reply-submit-btn">작성</button>
                </div>
            `;
            btnEl.closest('.comment-actions').after(box);

            // 취소
            box.querySelector('.reply-cancel-btn').onclick = () => box.remove();

            // 작성
            box.querySelector('.reply-submit-btn').onclick = async () => {
                const content = box.querySelector('.reply-input-text').value.trim();
                if (!content) return alert('내용을 입력하세요.');
                const payload = parentReplyId ? { parentReplyId: Number(parentReplyId), content } : { content };
                const token = sessionStorage.getItem('accessToken');
                const res = await fetch(`/api/problems/${window.problemId}/discussions/${discussionId}/replies`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        ...tokenHeader() 
                    },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    if (parentReplyId) {
                        // 대댓글: 해당 댓글의 대댓글만 새로고침
                        const childContainer = document.getElementById(`child-replies-for-${parentReplyId}`);
                        if (childContainer) {
                            childContainer.dataset.loaded = 'true';
                            const discussionId = btnEl.closest('.discussion-item').dataset.discussionId;
                            const childReplies = await fetchChildReplies(discussionId, parentReplyId);
                            renderReplies(childContainer, childReplies, discussionId, 1);
                            // 펼쳐진 상태로 유지
                            childContainer.style.display = 'block';
                            // 버튼 텍스트/상태 갱신
                            const toggleBtn = btnEl.closest('.reply-item').querySelector('.toggle-child-replies-btn');
                            if (toggleBtn) {
                                toggleBtn.textContent = '대댓글 접기';
                                toggleBtn.dataset.open = 'true';
                            }
                        }
                    } else {
                        // 댓글: 전체 댓글 새로고침
                        const container = document.getElementById(`replies-for-${discussionId}`);
                        if (container) {
                            container.dataset.loaded = 'true';
                            const replies = await fetchReplies(discussionId);
                            renderReplies(container, replies, discussionId, 0);
                            // 펼쳐진 상태로 유지
                            container.style.display = 'block';
                            // 버튼 텍스트/상태 갱신
                            const toggleBtn = btnEl.closest('.discussion-item').querySelector('.toggle-replies-btn');
                            if (toggleBtn) {
                                toggleBtn.textContent = '댓글 접기';
                                toggleBtn.dataset.open = 'true';
                            }
                        }
                    }
                    box.remove();
                } else {
                    alert('작성에 실패했습니다.');
                }
            };
        }

        function renderDiscussionCreateBox() {
            const box = document.getElementById('discussion-create-box');
            box.innerHTML = `
                <textarea id="discussion-create-text" class="reply-input-text" rows="4" placeholder="토론글을 작성해보세요"></textarea>
                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <button id="discussion-create-cancel" class="reply-cancel-btn">취소</button>
                    <button id="discussion-create-submit" class="reply-submit-btn">작성</button>
                </div>
            `;
            // 취소: 입력 내용만 비움
            box.querySelector('#discussion-create-cancel').onclick = () => {
                box.querySelector('#discussion-create-text').value = '';
            };
            // 작성
            box.querySelector('#discussion-create-submit').onclick = async () => {
                const content = box.querySelector('#discussion-create-text').value.trim();
                if (!content) return alert('내용을 입력하세요.');
                const token = sessionStorage.getItem('accessToken');
                const res = await fetch(`/api/problems/${window.problemId}/discussions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...tokenHeader()
                    },
                    body: JSON.stringify({ languageId: 1, content })
                });
                if (res.ok) {
                    // 성공: 입력창 비우고 목록 새로고침
                    box.querySelector('#discussion-create-text').value = '';
                    loadDiscussions(window.problemId, 0, 10, document.getElementById('discussion-sort')?.value || 'best');
                } else {
                    alert('토론글 작성에 실패했습니다.');
                }
            };
        }

        // 페이지 진입 시 항상 렌더링
        document.addEventListener('DOMContentLoaded', () => {
            renderDiscussionCreateBox();
        });

        fetch('/html/header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });
    </script>

    <script src="/js/footerUtils.js"></script>
    <script src="/js/headerNotification.js"></script>
    <script>
        loadHeaderWithAuthCheck();
        loadFooter(); // 푸터 로드
    </script>
