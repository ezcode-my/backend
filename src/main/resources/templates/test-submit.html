<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>EzCode 코드 제출</title>
    <link rel="stylesheet" href="/css/header.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            background-color: #0f111a;
            color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        #header-placeholder {
            margin-bottom: 32px;
        }

        .container {
            display: flex;
            padding: 30px 40px;
            gap: 30px;
        }

        .left {
            flex: 1;
            background-color: #12141f;
            border-radius: 12px;
            padding: 24px;
        }

        .right {
            flex: 1.5;
            background-color: #0f111a;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section {
            background-color: #1c1e2b;
            padding: 24px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h2, h3 {
            color: #00d084;
            margin-bottom: 20px;
        }

        .grid {
            display: flex;
            gap: 24px;
            flex-wrap: nowrap;
            margin-bottom: 20px;
        }

        .grid > div {
            flex: 1;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #2a2d3d;
            border: 1px solid #3a3d4d;
            border-radius: 8px;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            width: 100%;
        }

        button {
            margin-top: 12px;
            background-color: #00d084;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #00b472;
        }

        .result-box {
            background-color: #1e212f;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #3a3d4d;
            white-space: pre-wrap;
            font-family: 'Roboto Mono', monospace;
        }

        #prob-title {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #ffffff;
        }

        #prob-desc {
            font-size: 15px;
            line-height: 1.6;
        }

        ul {
            padding-left: 20px;
        }

        .git-sidebar {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/25/25231.png');
            background-size: 70%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1e212f;
            border-radius: 12px;
            z-index: 10;
        }

        .git-status-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: gray;
        }

        .slot {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
        }

        .init {
            background-color: #374157; /* 채점 중인 상태 강조 */
            color: #ccd6f6;
        }

        .passed {
            background-color: #214d35;
            color: #b2f5bf;
        }

        .failed {
            background-color: #552222;
            color: #f8baba;
        }

        .final-summary {
            margin-top: 12px;
            padding: 12px 16px;
            background-color: #1d2233;
            border: 1px solid #00d084;
            border-left: 5px solid #00d084;
            border-radius: 6px;
            font-size: 15px;
            color: #d0ffe2;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>
<div class="container">
    <div class="left">
        <div id="prob-title">문제 제목</div>
        <div id="prob-desc">문제 설명이 여기에 표시됩니다.</div>
        <ul>
            <li>시간 제한: <span id="prob-time">--</span> ms</li>
            <li>메모리 제한: <span id="prob-mem">--</span> KB</li>
            <li>카테고리: <span id="prob-cats">--</span></li>
        </ul>
    </div>
    <div class="right">
        <div class="section">
            <h2>코드 제출</h2>
            <div class="grid">
                <div>
                    <label for="jwtToken">JWT 토큰</label>
                    <input type="text" id="jwtToken" placeholder="Bearer …" />
                </div>
                <div>
                    <label for="problemId">문제 ID</label>
                    <input type="number" id="problemId" placeholder="문제 ID" />
                </div>
                <div>
                    <label for="languageId">언어 ID</label>
                    <input type="number" id="languageId" placeholder="언어 ID" />
                </div>
            </div>
            <label for="sourceCode">소스코드</label>
            <textarea id="sourceCode" rows="10" placeholder="// 여기에 Java 코드를 입력하세요"></textarea>
            <button onclick="submitCode()">코드 제출 (WebSocket)</button>
        </div>
        <div class="section">
            <h3>채점 결과</h3>
            <div class="git-sidebar">
                <div class="git-status-dot" id="gitDot"></div>
            </div>
            <div id="judgeResult" class="result-box">여기에 테스트 결과가 표시됩니다</div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script defer>
    let stompClient;
    let connected = false;
    const gitDot = document.getElementById('gitDot');
    const jwtInput = document.getElementById('jwtToken');
    const pidInput = document.getElementById('problemId');
    const probTitleEl = document.getElementById('prob-title');
    const probDescEl = document.getElementById('prob-desc');
    const probTimeEl = document.getElementById('prob-time');
    const probMemEl = document.getElementById('prob-mem');
    const probCatsEl = document.getElementById('prob-cats');

    if (localStorage.getItem('jwtToken')) jwtInput.value = localStorage.getItem('jwtToken');
    jwtInput.addEventListener('input', () => localStorage.setItem('jwtToken', jwtInput.value.trim()));

    window.addEventListener('DOMContentLoaded', () => {
        const pid = new URLSearchParams(location.search).get('problemId');
        if (pid) pidInput.value = pid;
        loadProblem();
    });

    pidInput.addEventListener('change', loadProblem);

    async function loadProblem() {
        const pid = pidInput.value.trim();
        if (!pid) {
            probTitleEl.textContent = '문제 ID를 입력하세요';
            probDescEl.innerHTML = '';
            probTimeEl.textContent = probMemEl.textContent = probCatsEl.textContent = '--';
            return;
        }
        try {
            const res = await fetch(`/api/problems/${pid}`, {
                headers: { 'Accept': 'application/json', ...tokenHeader() }
            });
            if (res.status === 401) {
                probTitleEl.textContent = '인증 필요: JWT 토큰을 입력하세요';
                return;
            }
            if (!res.ok) {
                probTitleEl.textContent = `조회 실패 (HTTP ${res.status})`;
                return;
            }
            const wrapper = await res.json();
            const data = wrapper.result ?? wrapper;
            probTitleEl.textContent = `${data.id}. ${data.title}`;
            probDescEl.innerHTML = data.description ? marked.parse(data.description) : '';
            probTimeEl.textContent = data.timeLimit ?? '--';
            probMemEl.textContent = data.memoryLimit ?? '--';
            probCatsEl.textContent = Array.isArray(data.categories) ? data.categories.join(', ') : '';
        } catch (err) {
            console.error(err);
            probTitleEl.textContent = '네트워크 오류';
        }
    }

    function getTokenValue() {
        const raw = jwtInput.value.trim();
        return raw.startsWith('Bearer ') ? raw : 'Bearer ' + raw;
    }

    function tokenHeader() {
        const raw = jwtInput.value.trim();
        return raw ? { 'Authorization': getTokenValue() } : {};
    }

    async function submitCode() {
        const pid = pidInput.value.trim();
        const payload = {
            languageId: +document.getElementById('languageId').value,
            sourceCode: document.getElementById('sourceCode').value
        };
        const judgeEl = document.getElementById('judgeResult');
        judgeEl.innerHTML = '';
        try {
            const res = await fetch(`/api/problems/${pid}/submit-ws`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...tokenHeader()
                },
                body: JSON.stringify(payload)
            });
            const resp = await res.json();
            if (!resp.success) {
                judgeEl.textContent = `Error: ${resp.message}`;
                return;
            }
            const sessionKey = resp.result;
            initWebSocket(sessionKey);
        } catch (err) {
            console.error(err);
            document.getElementById('judgeResult').textContent = '채점 요청 실패';
        }
    }

    function initWebSocket(sessionKey) {
        const tokenOnly = jwtInput.value.trim().replace(/^Bearer /, '');
        const socket = new SockJS(`/ws?token=${encodeURIComponent(tokenOnly)}`);
        stompClient = Stomp.over(socket);
        stompClient.debug = msg => console.log('[STOMP]', msg);

        stompClient.connect({}, () => {
            connected = true;
            const base = `/user/queue/submission/${sessionKey}`;
            stompClient.subscribe(`${base}/git-status`, msg => {
                let status;
                try {
                    const parsed = JSON.parse(msg.body);
                    status = parsed.pushStatus ?? msg.body;
                } catch (e) {
                    status = msg.body;
                }
                if (status === 'STARTED') gitDot.style.backgroundColor = '#ff9900';
                else if (status === 'SUCCESS') gitDot.style.backgroundColor = '#00d084';
                else if (status === 'FAILED') gitDot.style.backgroundColor = '#ff4d4d';
                else gitDot.style.backgroundColor = 'gray';
            });
            stompClient.subscribe(`${base}/init`, msg => handleInit(JSON.parse(msg.body)));
            stompClient.subscribe(`${base}/case`, msg => handleCase(JSON.parse(msg.body)));
            stompClient.subscribe(`${base}/final`, msg => handleFinal(JSON.parse(msg.body)));
        }, err => console.error('[STOMP] 연결 오류:', err));
    }

    function handleInit(slots) {
        const judgeEl = document.getElementById('judgeResult');
        judgeEl.innerHTML = '';
        slots.forEach(s => {
            const d = document.createElement('div');
            d.id = `slot-${s.seqId}`;
            d.className = 'slot init';
            d.textContent = `[${s.seqId}] 상태: ${s.status}`;
            judgeEl.appendChild(d);
        });
    }

    function handleCase(data) {
        const d = document.getElementById(`slot-${data.seqId}`);
        if (!d) return;
        d.className = data.isPassed ? 'slot passed' : 'slot failed';
        d.textContent = `[${data.seqId}] ${data.message} (${data.executionTime}ms, ${data.memoryUsage}KB)`;
    }

    function handleFinal(res) {
        const sum = document.createElement('div');
        sum.style.marginTop = '12px';
        sum.innerHTML = `<strong>최종:</strong> ${res.passedCount}/${res.totalCount} 통과 — ${res.message}`;
        document.getElementById('judgeResult').appendChild(sum);
    }

    fetch('/html/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });
</script>
</body>
</html>
