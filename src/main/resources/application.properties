# ========================
# Spring Config
# ========================
spring.application.name=ezcode
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========================
# MySQL
# ========================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Redis
# ========================
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}
spring.data.redis.password=${SPRING_REDIS_PASSWORD}

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}

# ========================
# Swagger
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ========================
# ActiveMQ
# ========================
spring.message.activemq.address=${ACTIVEMQ_ADDRESS}
spring.message.activemq.username=${ACTIVEMQ_USERNAME}
spring.message.activemq.password=${ACTIVEMQ_PASSWORD}
spring.message.activemq.port=${ACTIVEMQ_PORT}

# ========================
# Actuator && Prometheus
# ========================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.endpoint.health.access=unrestricted
management.endpoint.metrics.access=unrestricted
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true

# ========================
# Judge0Client
# ========================
external.judge0.url=${JUDGE0_URL}

# ========================
# ElasticSearch
# ========================
spring.datasource.elasticsearch.address=${ELASTICSEARCH_ADDRESS}
spring.datasource.elasticsearch.username=${ELASTICSEARCH_USERNAME}
spring.datasource.elasticsearch.password=${ELASTICSEARCH_PASSWORD}
spring.datasource.elasticsearch.port=${ELASTICSEARCH_PORT}

# ========================
# OpenAI
# ========================
openai.api.url=${OPEN_API_URL}
openai.api.key=${OPEN_API_KEY}

# ========================
# OAuth GOOGLE
# ========================
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=profile,email

# ========================
# mongo
# ========================
spring.data.mongodb.uri=${SPRING_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
logging.level.org.mongodb.driver.protocol.command=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# ========================
# Spring Cache Caffeine
# ========================
# spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

spring.cache.type=caffeine
logging.level.org.springframework.cache.interceptor.CacheInterceptor=TRACE

# ========================
# discord
# ========================
discord.webhook.url=${DISCORD_WEBHOOK_URL}

# ========================
# email-smtp
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EZ_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# OAuth GITHUB
# ========================
spring.security.oauth2.client.registration.github.client-name=github
spring.security.oauth2.client.registration.github.client-id=${CLIENT_ID_GITHUB}
spring.security.oauth2.client.registration.github.client-secret=${CLIENT_SECRET_GITHUB}
spring.security.oauth2.client.registration.github.redirect-uri=${REDIRECT_URI_GITHUB}
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.github.scope=user,repo

#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.security.oauth2=DEBUG
#logging.level.org.springframework.security.oauth2.client=TRACE
#logging.level.org.springframework.web.client.RestTemplate=TRACE

# ========================
# S3
# ========================
cloud.aws.credentials.access-key=${ACCESS_KEY}
cloud.aws.credentials.secret-key=${SECRET_KEY}

cloud.aws.s3.bucket=ezcode-s3
cloud.aws.region.static=ap-northeast-2
cloud.aws.stack.auto=false

# ========================
# AES
# ========================
aes.secret.key=${AES_SECRET_KEY}

# ========================
# git push
# ========================
github.repo.root-folder=ezcode

# ========================
# Hikari Connection Pool
# ========================
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# ========================
# App Redirects (Email Verify)
# ========================
# 인증 성공 시 이동할 페이지 URL (예: 프론트의 성공 안내 페이지)
app.redirect.verify.success=${APP_REDIRECT_VERIFY_SUCCESS:https://your-frontend.example.com/verify/success}
# 인증 실패 시 이동할 페이지 URL (예: 프론트의 실패 안내 페이지)
app.redirect.verify.failure=${APP_REDIRECT_VERIFY_FAILURE:https://your-frontend.example.com/verify/failure}

# processor metrics (system.cpu, process.cpu)
management.metrics.enable.process.cpu=false
management.metrics.enable.system.cpu=false

# process.uptime, process.start.time
management.metrics.enable.process.uptime=false
management.metrics.enable.process.start.time=false

# process.files
management.metrics.enable.process.files=false

# JVM metrics
management.metrics.enable.jvm=false
